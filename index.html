const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,S;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;S=Math.min(W/480,H/720)*1.1}
resize();addEventListener('resize',resize);

// ===== AUDIO =====
let actx,bgmGain;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  bgmGain=actx.createGain();bgmGain.gain.value=0.12;bgmGain.connect(actx.destination);
  playBGM();
}
function sfx(freq,dur,type,vol){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(vol||0.08,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);
}
function playBGM(){
  if(!actx)return;
  const notes=[110,130.81,146.83,164.81,174.61,196,220,246.94];
  let ni=0;
  function note(){
    if(!actx)return;
    const o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type='sine';o.frequency.value=notes[ni%notes.length]*0.5;
    f.type='lowpass';f.frequency.value=400;f.Q.value=2;
    o.connect(f);f.connect(g);g.connect(bgmGain);
    g.gain.setValueAtTime(0.15,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+2.5);
    o.start();o.stop(actx.currentTime+2.5);
    ni++;setTimeout(note,2000+Math.random()*1000);
  }
  note();
  setInterval(()=>{
    if(!actx)return;
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.frequency.value=800+Math.random()*400;
    o.connect(g);g.connect(bgmGain);
    g.gain.setValueAtTime(0.03,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
    o.start();o.stop(actx.currentTime+0.15);
  },3000+Math.random()*2000);
}

// ===== PIXEL SPRITES (large, detailed) =====
// Each pixel = S*2, so 8x8 sprite = 16*S pixels tall
function pxC(ctx,ox,oy,data,sc){
  for(const[c,r,R,G,B] of data){
    ctx.fillStyle=`rgb(${R},${G},${B})`;
    ctx.fillRect(ox+c*sc,oy+r*sc,sc,sc);
  }
}

// ===== PATH - simple S-curve =====
function getPath(){
  const cx=W/2, cy=H*0.46;
  const w=W*0.36, h=H*0.25;
  return [
    {x:cx-w,y:cy-h},
    {x:cx-w*0.3,y:cy-h},
    {x:cx+w*0.3,y:cy-h},
    {x:cx+w,y:cy-h},
    {x:cx+w,y:cy-h*0.3},
    {x:cx+w,y:cy+h*0.3},
    {x:cx+w,y:cy+h},
    {x:cx+w*0.3,y:cy+h},
    {x:cx-w*0.3,y:cy+h},
    {x:cx-w,y:cy+h},
    {x:cx-w,y:cy+h*0.3},
    {x:cx-w,y:cy-h*0.3},
    {x:cx-w*0.5,y:cy},
    {x:cx,y:cy},
    {x:cx+w*0.5,y:cy},
    {x:cx+w,y:cy},
  ];
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

// ===== TOWER DEFS =====
const DEF={
  guard:{cost:50,range:1.2,dmg:22,rate:600},
  archer:{cost:30,range:2.2,dmg:11,rate:280},
  healer:{cost:40,range:1.6,dmg:5,rate:400}
};

// ===== STATE =====
let towers=[],enemies=[],bullets=[],particles=[];
let gold=100,lives=20,wave=0,waveOn=false,sQ=[],sT=0;
let selT=null,run=false,lt=0;
let decor=[];

function genDecor(){
  decor=[];
  // Seaweed clusters
  for(let i=0;i<15;i++) decor.push({x:Math.random()*W,y:H*0.15+Math.random()*H*0.7,t:'s',sz:12+Math.random()*20,c:`hsl(${140+Math.random()*30},${55+Math.random()*25}%,${30+Math.random()*15}%)`,ph:Math.random()*6.28});
  // Coral
  for(let i=0;i<12;i++) decor.push({x:Math.random()*W,y:H*0.2+Math.random()*H*0.6,t:'c',sz:8+Math.random()*14,c:`hsl(${330+Math.random()*40},${65+Math.random()*25}%,${45+Math.random()*20}%)`,ph:Math.random()*6.28});

  for(let i=0;i<8;i++) decor.push({x:Math.random()*W,y:H*0.2+Math.random()*H*0.6,t:'r',sz:10+Math.random()*18,ph:Math.random()*6.28});
  // Bubble spawners
  for(let i=0;i<10;i++) decor.push({x:Math.random()*W,y:H*0.3+Math.random()*H*0.5,t:'b',sz:4+Math.random()*8,ph:Math.random()*6.28});
}

// ===== CLASSES =====
class Tw{
  constructor(x,y,type){this.x=x;this.y=y;this.type=type;this.def=DEF[type];this.lv=0;this.ls=0;this.buf=false;this.anim=0}
  get dmg(){return this.def.dmg*(1+this.lv*0.5)*(this.buf?1.2:1)}
  get rng(){return this.def.range*80*S*(1+this.lv*0.15)}
  get uc(){return Math.floor(this.def.cost*(0.5+this.lv*0.5))}
}

class En{
  constructor(hp,spd,boss){
    this.hp=hp;this.mhp=hp;this.spd=spd;this.boss=boss;
    this.path=getPath();this.pi=0;
    this.x=this.path[0].x;this.y=this.path[0].y;
    this.alive=true;this.reached=false;
    this.r=boss?30*S:18*S;this.gv=boss?30:5;
    this.bp=Math.random()*6.28;
  }
  update(dt){
    if(!this.alive)return;
    if(this.pi>=this.path.length-1){this.alive=false;this.reached=true;return}
    const t=this.path[this.pi+1],dx=t.x-this.x,dy=t.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    const st=this.spd*60*S*dt/1000;
    if(st>=d){this.x=t.x;this.y=t.y;this.pi++}
    else{this.x+=dx/d*st;this.y+=dy/d*st}
    this.bp+=dt*0.006;
  }
}

class Bl{
  constructor(x,y,tgt,dmg){this.x=x;this.y=y;this.tgt=tgt;this.dmg=dmg;this.alive=true}
  update(dt){
    if(!this.alive)return;
    if(!this.tgt||!this.tgt.alive){this.alive=false;return}
    const dx=this.tgt.x-this.x,dy=this.tgt.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<10*S){
      this.alive=false;this.tgt.hp-=this.dmg;
      for(let i=0;i<4;i++)particles.push(new Pt(this.tgt.x,this.tgt.y,'#ffaa00',2));
      if(this.tgt.hp<=0){this.tgt.alive=false;gold+=this.tgt.gv;sfx(400,0.1,'square',0.06);for(let i=0;i<10;i++)particles.push(new Pt(this.tgt.x,this.tgt.y,this.tgt.boss?'#ff44ff':'#ff4444',3))}
      return;
    }
    this.x+=dx/d*dt*0.3;this.y+=dy/d*dt*0.3;
  }
}

class Pt{
  constructor(x,y,c,sz){this.x=x;this.y=y;this.c=c;this.sz=sz||2;this.vx=(Math.random()-.5)*5;this.vy=(Math.random()-.5)*5;this.l=500;this.a=true}
  update(dt){this.l-=dt;if(this.l<=0){this.a=false;return}this.x+=this.vx;this.y+=this.vy;this.vy+=0.03;this.sz*=0.99}
}

// ===== WAVE =====
function sendWave(){
  if(waveOn)return;wave++;waveOn=true;
  sfx(600,0.2,'sine',0.1);
  const n=5+wave*2,hp=80+wave*30,spd=1+wave*0.04;
  sQ=[];for(let i=0;i<n;i++)sQ.push(new En(hp,spd,false));
  if(wave%5===0)sQ.push(new En(hp*18,spd*0.35,true));
  sT=0;
}

// ===== UPDATE =====
function update(dt){
  if(!run)return;
  sT-=dt;if(sT<=0&&sQ.length>0){enemies.push(sQ.shift());sT=500}
  for(const e of enemies){e.update(dt);if(e.reached){lives--;if(lives<=0){run=false;showEnd()}}}
  enemies=enemies.filter(e=>e.alive);
  for(const t of towers)t.buf=false;
  for(const t of towers){if(t.type!=='healer')continue;for(const t2 of towers){if(t2===t)continue;if(dist(t,t2)<=t.rng)t2.buf=true}}
  const now=performance.now();
  for(const t of towers){
    let best=null,bd=1e9;
    for(const e of enemies){const d=dist(t,e);if(d<=t.rng&&d<bd){best=e;bd=d}}
    t.anim=best?Math.atan2(best.y-t.y,best.x-t.x):t.anim;
    if(best&&now-t.ls>=t.def.rate){t.ls=now;bullets.push(new Bl(t.x,t.y,best,t.dmg));
      sfx(800,0.04,'sine',0.04);
      particles.push(new Pt(t.x+Math.cos(t.anim)*15*S,t.y+Math.sin(t.anim)*15*S,'#fff',1.5));
    }
  }
  for(const b of bullets)b.update(dt);bullets=bullets.filter(b=>b.alive);
  for(const p of particles)p.update(dt);particles=particles.filter(p=>p.a);
  if(waveOn&&sQ.length===0&&enemies.length===0){waveOn=false;gold+=10+wave*2;if(towers.length>0)setTimeout(()=>{if(run)sendWave()},2500)}
  document.getElementById('hW').textContent=wave;
  document.getElementById('hG').textContent=gold;
  document.getElementById('hL').textContent=lives;
}

// ===== DRAW =====
function draw(){
  // Deep ocean background
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#08203f');bg.addColorStop(0.25,'#0c3058');bg.addColorStop(0.5,'#104070');bg.addColorStop(0.75,'#0c3058');bg.addColorStop(1,'#08203f');
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  const t=performance.now();

  // Caustic light patterns (underwater refraction)
  X.save();X.globalAlpha=0.04;
  for(let i=0;i<8;i++){
    const rx=W*0.08+i*W*0.12+Math.sin(t*0.0002+i*1.3)*30*S;
    const ry=H*0.1+Math.cos(t*0.0003+i*0.9)*20*S;
    X.fillStyle='#00ccff';
    X.beginPath();X.ellipse(rx,ry,25*S,80*S,Math.sin(t*0.0001+i)*0.3,0,Math.PI*2);X.fill();
  }
  X.restore();

  // Light rays from top
  X.save();X.globalAlpha=0.06;
  for(let i=0;i<5;i++){
    const rx=W*0.15+i*W*0.18+Math.sin(t*0.00025+i)*25*S;
    const g=X.createLinearGradient(rx,0,rx+40*S,H);
    g.addColorStop(0,'#00eeff');g.addColorStop(1,'transparent');
    X.fillStyle=g;X.fillRect(rx,0,50*S,H);
  }
  X.restore();

  // Bubbles
  for(const d of decor){
    if(d.t==='b'){
      const by=((d.y-((t*0.06+d.ph*60)%(H*1.3)))+H*1.3)%(H*1.3);
      const br=d.sz*S;
      X.beginPath();X.arc(d.x,by,br,0,Math.PI*2);
      X.fillStyle='rgba(80,180,255,0.06)';X.fill();
      X.strokeStyle='rgba(100,200,255,0.25)';X.lineWidth=1.5;X.stroke();
      // Highlight
      X.beginPath();X.arc(d.x-br*0.3,by-br*0.3,br*0.2,0,Math.PI*2);
      X.fillStyle='rgba(200,240,255,0.3)';X.fill();
    }
  }

  // Seaweed
  for(const d of decor){
    if(d.t==='s'){
      const sw=Math.sin(t*0.0015+d.ph)*12*S;
      const h=d.sz*S;
      X.strokeStyle=d.c;X.lineWidth=4*S;X.lineCap='round';
      X.beginPath();X.moveTo(d.x,d.y);
      X.quadraticCurveTo(d.x+sw*0.6,d.y-h*0.6,d.x+sw,d.y-h);
      X.stroke();
      // Leaves
      X.fillStyle=d.c;X.globalAlpha=0.6;
      X.beginPath();X.ellipse(d.x+sw*0.3,d.y-h*0.4,4*S,2*S,sw*0.02,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(d.x+sw*0.7,d.y-h*0.7,3*S,2*S,-sw*0.02,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
  }

  // Coral
  for(const d of decor){
    if(d.t==='c'){
      X.fillStyle=d.c;X.globalAlpha=0.6;
      // Branching coral
      for(let i=0;i<5;i++){
        const bx=d.x+Math.sin(d.ph+i*1.3)*d.sz*0.35*S;
        const by=d.y-Math.abs(Math.cos(d.ph+i*1.3))*d.sz*0.4*S-i*d.sz*0.25*S;
        X.beginPath();X.arc(bx,by,d.sz*0.18*S,0,Math.PI*2);X.fill();
      }
      // Base
      X.beginPath();X.ellipse(d.x,d.y,d.sz*0.4*S,d.sz*0.15*S,0,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
  }

  // Rocks
  for(const d of decor){
    if(d.t==='r'){
      X.fillStyle='rgba(40,55,70,0.5)';
      X.beginPath();X.ellipse(d.x,d.y,d.sz*S,d.sz*0.5*S,0,0,Math.PI*2);X.fill();
      X.fillStyle='rgba(55,70,85,0.4)';
      X.beginPath();X.ellipse(d.x-d.sz*0.2*S,d.y-d.sz*0.1*S,d.sz*0.5*S,d.sz*0.3*S,0.3,0,Math.PI*2);X.fill();
    }
  }

  // PATH - thick glowing trail
  const path=getPath();
  if(path.length>1){
    // Outer glow
    X.strokeStyle='rgba(0,200,170,0.1)';X.lineWidth=60*S;X.lineCap='round';X.lineJoin='round';
    X.beginPath();X.moveTo(path[0].x,path[0].y);
    for(let i=1;i<path.length;i++)X.lineTo(path[i].x,path[i].y);X.stroke();
    // Main trail
    X.strokeStyle='rgba(0,170,150,0.35)';X.lineWidth=36*S;
    X.beginPath();X.moveTo(path[0].x,path[0].y);
    for(let i=1;i<path.length;i++)X.lineTo(path[i].x,path[i].y);X.stroke();
    // Bright center
    X.strokeStyle='rgba(0,230,200,0.2)';X.lineWidth=18*S;
    X.beginPath();X.moveTo(path[0].x,path[0].y);
    for(let i=1;i<path.length;i++)X.lineTo(path[i].x,path[i].y);X.stroke();
    // Direction dots
    X.fillStyle='rgba(0,255,200,0.35)';
    for(let i=0;i<path.length-1;i+=2){
      const mx=(path[i].x+path[i+1].x)/2,my=(path[i].y+path[i+1].y)/2;
      X.beginPath();X.arc(mx,my,4*S,0,Math.PI*2);X.fill();
    }
    // Labels
    X.font=`bold ${14*S}px Arial`;X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#ff5577';X.shadowColor='#ff3355';X.shadowBlur=8;
    X.fillText('▶ 入口',path[0].x,path[0].y-30*S);
    X.fillText('🏠 基地',path[path.length-1].x,path[path.length-1].y-30*S);
    X.shadowBlur=0;
  }

  // Placement hint zones
  if(selT&&run){
    const path=getPath();
    for(let px=25;px<W;px+=45*S){
      for(let py=45;py<H-45;py+=45*S){
        let near=false;
        for(let i=0;i<path.length;i++){if(dist({x:px,y:py},path[i])<50*S){near=true;break}}
        if(!near)continue;
        let occ=false;
        for(const tw of towers){if(dist({x:px,y:py},tw)<38*S){occ=true;break}}
        if(occ)continue;
        X.fillStyle='rgba(0,255,200,0.07)';
        X.fillRect(px-16*S,py-16*S,32*S,32*S);
        X.strokeStyle='rgba(0,255,200,0.2)';X.lineWidth=1;
        X.strokeRect(px-16*S,py-16*S,32*S,32*S);
      }
    }
  }

  // TOWERS
  for(const tw of towers){
    const drawFns={guard:drawGuard,archer:drawArcher,healer:drawHealer};
    if(drawFns[tw.type])drawFns[tw.type](X,tw.x,tw.y);
    if(tw.buf){
      X.save();X.globalAlpha=0.3+0.1*Math.sin(t*0.005);
      X.strokeStyle='#44ff44';X.lineWidth=2.5;X.setLineDash([4,4]);
      X.beginPath();X.arc(tw.x,tw.y,28*S,0,Math.PI*2);X.stroke();
      X.setLineDash([]);X.restore();
    }
    X.fillStyle='#ffd700';X.font=`bold ${9*S}px Arial`;X.textAlign='center';
    for(let i=0;i<tw.lv;i++)X.fillText('★',tw.x-8+i*8,tw.y-28*S);
  }

  // ENEMIES
  for(const e of enemies){
    const bob=Math.sin(e.bp)*3*S;
    if(e.boss)drawBoss(X,e.x,e.y+bob);
    else drawJelly(X,e.x,e.y+bob);
    // HP bar
    const bw=e.r*2,bh=4*S;
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(e.x-bw/2,e.y-e.r-10*S,bw,bh);
    X.fillStyle=e.hp>e.mhp*0.3?'#44ff44':'#ff2222';
    X.fillRect(e.x-bw/2,e.y-e.r-10*S,bw*Math.max(0,e.hp/e.mhp),bh);
    X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=0.5;
    X.strokeRect(e.x-bw/2,e.y-e.r-10*S,bw,bh);
  }

  // BULLETS
  for(const b of bullets){
    X.fillStyle='#fff';X.shadowColor='#ffaa00';X.shadowBlur=6*S;
    X.beginPath();X.arc(b.x,b.y,3*S,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }

  // PARTICLES
  for(const p of particles){
    X.globalAlpha=Math.max(0,p.l/500);X.fillStyle=p.c;
    X.beginPath();X.arc(p.x,p.y,p.sz*S,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // HINT
  if(towers.length===0&&run){
    const pulse=0.5+0.5*Math.sin(t/400);
    X.fillStyle=`rgba(0,212,255,${0.4+pulse*0.35})`;
    X.font=`bold ${15*S}px Arial`;X.textAlign='center';X.textBaseline='middle';
    X.fillText('⬇ 选塔 → 点击路径旁空地放置 ⬇',W/2,H*0.42);
  }
}

function loop(ts){const dt=lt?Math.min(ts-lt,50):16;lt=ts;resize();update(dt);draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

// ===== INPUT =====
C.addEventListener('pointerdown',e=>{
  if(!run)return;
  const px=e.clientX,py=e.clientY;
  for(const tw of towers){if(dist({x:px,y:py},tw)<25*S){if(tw.lv<2&&gold>=tw.uc){gold-=tw.uc;tw.lv++;sfx(1000,0.15,'sine',0.1);for(let i=0;i<8;i++)particles.push(new Pt(tw.x,tw.y,'#ffd700',2))}return}}
  if(!selT)return;
  const path=getPath();
  let near=false;for(let i=0;i<path.length;i++){if(dist({x:px,y:py},path[i])<50*S){near=true;break}}
  if(!near)return;
  for(const tw of towers){if(dist({x:px,y:py},tw)<38*S)return}
  if(gold<DEF[selT].cost)return;
  gold-=DEF[selT].cost;towers.push(new Tw(px,py,selT));
  sfx(500,0.1,'sine',0.08);
  for(let i=0;i<6;i++)particles.push(new Pt(px,py,'#00ffaa',2));
});

function sel(type){
  if(gold<DEF[type].cost)return;
  selT=type;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));
  document.getElementById(type==='guard'?'bg':type==='archer'?'ba':'bh').classList.add('sel');
}

function go(){
  initAudio();
  document.getElementById('scr').classList.add('hid');
  run=true;gold=100;lives=20;wave=0;
  towers=[];enemies=[];bullets=[];particles=[];
  waveOn=false;sQ=[];genDecor();
  setTimeout(sendWave,800);
}

function showEnd(){
  sfx(200,0.5,'sine',0.15);
  const s=document.getElementById('scr');s.classList.remove('hid');
  s.querySelector('h1').textContent='游戏结束';
  s.querySelector('.sub').textContent=`波次 ${wave} · 得分 ${wave*100}`;
  s.querySelector('.btn').textContent='再来一局';
}
</script>
</body>
</html>
